<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Review Hub</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f3f4f6;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#1e3a8a;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    input, textarea, select{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:15px;
    }

    button{
      margin-top:15px;
      background:#2563eb;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
    }

    button:hover{
      background:#1d4ed8;
    }

    .review-card{
      background:#fff;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .review-card img{
      width:100%;
      max-height:250px;
      object-fit:cover;
      border-radius:10px;
      margin-top:10px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
    }

    .branch{
      background:#dbeafe;
      color:#1e40af;
      padding:4px 10px;
      border-radius:20px;
      font-size:13px;
      display:inline-block;
      margin-top:5px;
    }

    .search-box{
      margin-bottom:20px;
    }

    .rating{
      color:#f59e0b;
      margin-top:5px;
      font-size:18px;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>College Review Hub</h1>

    <!-- Add Review -->
    <div class="card">
      <h2>Add Review</h2>

      <input type="text" id="collegeName" placeholder="College Name">

      <input type="text" id="branch" placeholder="Your Branch (CSE, ECE, EE etc)">

      <input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5">

      <input type="text" id="imageUrl" placeholder="College Photo URL (Optional)">

      <textarea id="reviewText" rows="5" placeholder="Write your review"></textarea>

      <button onclick="submitReview()">Post Review</button>
    </div>

    <!-- Search -->
    <div class="card search-box">
      <h2>Search Reviews</h2>

      <input type="text" id="searchInput" placeholder="Search by college name..." onkeyup="searchReviews()">
    </div>

    <!-- Reviews -->
    <div id="reviewsContainer"></div>

  </div>

  <script>

    // ---------------- FIREBASE CONFIG ----------------
    // Replace with your Firebase config

 const firebaseConfig = {
  apiKey: "AIzaSyAKqsWATk0mdpfoyc-7SOkLRMob4Zaj__U",
  authDomain: "campusvoice-21170.firebaseapp.com",
  databaseURL: "https://campusvoice-21170-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "campusvoice-21170",
  storageBucket: "campusvoice-21170.firebasestorage.app",
  messagingSenderId: "1009764911560",
  appId: "1:1009764911560:web:9544145427c0e8ecf918fd"
};

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    // ---------------- SUBMIT REVIEW ----------------

    async function submitReview(){

      const collegeName = document.getElementById("collegeName").value;
      const branch = document.getElementById("branch").value;
      const rating = document.getElementById("rating").value;
      const imageUrl = document.getElementById("imageUrl").value;
      const reviewText = document.getElementById("reviewText").value;

      if(!collegeName || !branch || !rating || !reviewText){
        alert("Please fill all required fields");
        return;
      }

      await db.collection("reviews").add({
        collegeName,
        branch,
        rating,
        imageUrl,
        reviewText,
        createdAt: new Date()
      });

      alert("Review Posted Successfully");

      document.getElementById("collegeName").value = "";
      document.getElementById("branch").value = "";
      document.getElementById("rating").value = "";
      document.getElementById("imageUrl").value = "";
      document.getElementById("reviewText").value = "";

      loadReviews();
    }

    // ---------------- LOAD REVIEWS ----------------

    async function loadReviews(){

      const container = document.getElementById("reviewsContainer");

      container.innerHTML = "";

      const snapshot = await db.collection("reviews")
      .orderBy("createdAt","desc")
      .get();

      snapshot.forEach(doc => {

        const data = doc.data();

        let stars = "";

        for(let i=0;i<data.rating;i++){
          stars += "⭐";
        }

        container.innerHTML += `
          <div class="review-card">

            <div class="top">
              <h2>${data.collegeName}</h2>
            </div>

            <div class="branch">${data.branch}</div>

            <div class="rating">${stars}</div>

            <p style="margin-top:10px;">
              ${data.reviewText}
            </p>

            ${
              data.imageUrl ? 
              `<img src="${data.imageUrl}" alt="College Photo">`
              : ""
            }

          </div>
        `;

      });

    }

    // ---------------- SEARCH ----------------

    async function searchReviews(){

      const searchValue = document.getElementById("searchInput").value.toLowerCase();

      const container = document.getElementById("reviewsContainer");

      container.innerHTML = "";

      const snapshot = await db.collection("reviews").get();

      snapshot.forEach(doc => {

        const data = doc.data();

        if(data.collegeName.toLowerCase().includes(searchValue)){

          let stars = "";

          for(let i=0;i<data.rating;i++){
            stars += "⭐";
          }

          container.innerHTML += `
            <div class="review-card">

              <div class="top">
                <h2>${data.collegeName}</h2>
              </div>

              <div class="branch">${data.branch}</div>

              <div class="rating">${stars}</div>

              <p style="margin-top:10px;">
                ${data.reviewText}
              </p>

              ${
                data.imageUrl ? 
                `<img src="${data.imageUrl}" alt="College Photo">`
                : ""
              }

            </div>
          `;
        }

      });

    }

    loadReviews();

  </script>

</body>
</html>
